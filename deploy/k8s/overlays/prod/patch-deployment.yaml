apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapir
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: snapir
          image: ghcr.io/example/snapir:stable
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
