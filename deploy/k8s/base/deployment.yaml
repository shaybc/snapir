apiVersion: apps/v1
kind: Deployment
metadata:
  name: snapir
  labels:
    app.kubernetes.io/name: snapir
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: snapir
  template:
    metadata:
      labels:
        app.kubernetes.io/name: snapir
    spec:
      containers:
        - name: snapir
          image: ghcr.io/example/snapir:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: snapir-config
            - secretRef:
                name: snapir-secrets
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: snapir
  labels:
    app.kubernetes.io/name: snapir
spec:
  selector:
    app.kubernetes.io/name: snapir
  ports:
    - name: http
      port: 80
      targetPort: http
  type: ClusterIP
