<?xml version="1.0" encoding="ISO-8859-1"?>
<dse.ini>

  <!-- INTERNET channel inherits all built-in formatter/decorator/service mappings
       from the XML channel base. Channel-specific opStep classes are added here. -->

  <kColl id="import">
    <field id="XML"/>
  </kColl>

  <kColl id="settings">

    <kColl id="files">

      <kColl id="defaultFile">
        <operDef id="Xml Definition/Channel/INTERNET/defaultFile/dsecontext.xml"/>
        <operDef id="Xml Definition/Channel/INTERNET/defaultFile/dseformat.xml"/>
        <operDef id="Xml Definition/Channel/INTERNET/defaultFile/dsedata.xml"/>
        <operDef id="Xml Definition/Channel/INTERNET/defaultFile/dseConnector.tmp"/>
      </kColl>

      <!-- ============================================================ -->
      <!-- Operation registry                                            -->
      <!-- Each entry: xml file path -> operation name                  -->
      <!-- ============================================================ -->
      <kColl id="selfDefOper">

        <operDef id="Xml Definition/Channel/INTERNET/selfDefOper/GetClientAccounts.xml"
                 value="GetClientAccountsOp"/>

        <operDef id="Xml Definition/Channel/INTERNET/selfDefOper/GetAccountDetails.xml"
                 value="GetAccountDetailsOp"/>

        <operDef id="Xml Definition/Channel/INTERNET/selfDefOper/TransferFunds.xml"
                 value="TransferFundsOp"/>

        <operDef id="Xml Definition/Channel/INTERNET/selfDefOper/GetClientLinks.xml"
                 value="GetClientLinksOp"/>

      </kColl>

      <kColl id="operations">
      </kColl>

    </kColl>

    <kColl id="tags">

      <!-- INTERNET-specific opStep implementations -->
      <kColl id="opSteps">

        <!-- DB accessor opSteps -->
        <field id="GetClientAccountsSP"
               value="com.ibm.il.dse.operations.internet.db.GetClientAccountsSP"/>
        <field id="GetAccountDetailsSP"
               value="com.ibm.il.dse.operations.internet.db.GetAccountDetailsSP"/>
        <field id="GetAccountTransactionsSP"
               value="com.ibm.il.dse.operations.internet.db.GetAccountTransactionsSP"/>
        <field id="ExecuteTransferSP"
               value="com.ibm.il.dse.operations.internet.db.ExecuteTransferSP"/>
        <field id="ValidateTransferLimitsSP"
               value="com.ibm.il.dse.operations.internet.db.ValidateTransferLimitsSP"/>
        <field id="GetClientLinksSP"
               value="com.ibm.il.dse.operations.internet.db.GetClientLinksSP"/>

        <!-- Backend service call opSteps -->
        <field id="CallCorebanking"
               value="com.ibm.il.dse.operations.internet.service.CallCorebanking"/>
        <field id="CallFraudDetection"
               value="com.ibm.il.dse.operations.internet.service.CallFraudDetection"/>

      </kColl>

      <kColl id="formats">
      </kColl>

      <kColl id="contexts">
      </kColl>

      <kColl id="services">
      </kColl>

    </kColl>

  </kColl>

</dse.ini>
