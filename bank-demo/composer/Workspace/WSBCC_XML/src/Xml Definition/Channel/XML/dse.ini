<?xml version="1.0" encoding="ISO-8859-1"?>
<dse.ini>

  <!-- XML channel is the shared base imported by all other channels.
       It defines all built-in formatter, decorator, and service tag mappings.
       It does not define any operations of its own. -->

  <kColl id="settings">

    <kColl id="files">

      <kColl id="defaultFile">
        <operDef id="Xml Definition/Channel/XML/defaultFile/dsecontext.xml"/>
        <operDef id="Xml Definition/Channel/XML/defaultFile/dseformat.xml"/>
        <operDef id="Xml Definition/Channel/XML/defaultFile/dsedata.xml"/>
        <operDef id="Xml Definition/Channel/XML/defaultFile/dseConnector.tmp"/>
      </kColl>

      <kColl id="selfDefOper">
        <!-- XML channel has no operations of its own -->
      </kColl>

      <kColl id="operations">
      </kColl>

    </kColl>

    <kColl id="tags">

      <!-- ============================================================ -->
      <!-- Formatter tags                                                -->
      <!-- ============================================================ -->
      <kColl id="formats">

        <!-- Core XML formatters -->
        <field id="CCXML"           value="com.ibm.il.dse.cc.format.CCXML"/>
        <field id="CCString"        value="com.ibm.il.dse.cc.format.CCString"/>
        <field id="CCDate"          value="com.ibm.il.dse.cc.format.CCDate"/>
        <field id="CCTime"          value="com.ibm.il.dse.cc.format.CCTime"/>
        <field id="CCBoolean"       value="com.ibm.il.dse.cc.format.CCBoolean"/>
        <field id="NumberFormat"    value="com.ibm.il.dse.cc.format.NumberFormat"/>
        <field id="CCIColl"         value="com.ibm.il.dse.cc.format.CCIColl"/>
        <field id="CCKColl"         value="com.ibm.il.dse.cc.format.CCKColl"/>
        <field id="CCTableFormat"   value="com.ibm.il.dse.cc.format.CCTableFormat"/>
        <field id="CCConstant"      value="com.ibm.il.dse.cc.format.CCConstant"/>
        <field id="CCConditionalString" value="com.ibm.il.dse.cc.format.CCConditionalString"/>
        <field id="CCSysTimeDate"   value="com.ibm.il.dse.cc.format.CCSysTimeDate"/>
        <field id="CCHostName"      value="com.ibm.il.dse.cc.format.CCHostName"/>
        <field id="CCLength"        value="com.ibm.il.dse.cc.format.CCLength"/>
        <field id="CCEnumFormat"    value="com.ibm.il.dse.cc.format.CCEnumFormat"/>
        <field id="CCReflect"       value="com.ibm.il.dse.cc.format.CCReflect"/>
        <field id="CCTagValue"      value="com.ibm.il.dse.cc.format.CCTagValue"/>

        <!-- Decorator tags (resolved to decorator FQCN — any formatter can use these) -->
        <field id="nilDecorator"              value="com.ibm.il.dse.cc.decorator.NilDecorator"/>
        <field id="RemoveLeadingZerosDecorator" value="com.ibm.il.dse.cc.decorator.RemoveLeadingZerosDecorator"/>
        <field id="CCPadding"                 value="com.ibm.il.dse.cc.decorator.CCPadding"/>
        <field id="CCFixedLength"             value="com.ibm.il.dse.cc.decorator.CCFixedLength"/>
        <field id="CCMandatory"               value="com.ibm.il.dse.cc.decorator.CCMandatory"/>
        <field id="CCNotNull"                 value="com.ibm.il.dse.cc.decorator.CCNotNull"/>
        <field id="CCZeroToNull"              value="com.ibm.il.dse.cc.decorator.CCZeroToNull"/>
        <field id="CCNullToZero"              value="com.ibm.il.dse.cc.decorator.CCNullToZero"/>
        <field id="MaskLogDecorator"          value="com.ibm.il.dse.cc.decorator.MaskLogDecorator"/>
        <field id="Base64Decorator"           value="com.ibm.il.dse.cc.decorator.Base64Decorator"/>
        <field id="CCRegExp"                  value="com.ibm.il.dse.cc.decorator.CCRegExp"/>
        <field id="CCRegExpReplace"           value="com.ibm.il.dse.cc.decorator.CCRegExpReplace"/>
        <field id="SetCenturyFor2DigitsYear"  value="com.ibm.il.dse.cc.decorator.SetCenturyFor2DigitsYear"/>

      </kColl>

      <!-- ============================================================ -->
      <!-- opStep tag registry                                           -->
      <!-- ============================================================ -->
      <kColl id="opSteps">
        <!-- Shared utility opStep classes -->
        <field id="MapErrorByValueAlways"
               value="com.ibm.il.dse.operations.common.MapErrorByValueAlways"/>
        <field id="MapErrorConditional"
               value="com.ibm.il.dse.operations.common.MapErrorConditional"/>
        <field id="ValidateInputFields"
               value="com.ibm.il.dse.operations.common.ValidateInputFields"/>
        <field id="SetChannelContext"
               value="com.ibm.il.dse.operations.common.SetChannelContext"/>
      </kColl>

      <!-- ============================================================ -->
      <!-- CCDSEServerOperation base class                               -->
      <!-- ============================================================ -->
      <kColl id="operations">
        <field id="CCDSEServerOperation"
               value="com.ibm.il.dse.cc.cut.CCDSEServerOperation"
               description="compound"/>
      </kColl>

      <!-- ============================================================ -->
      <!-- Backend service connectors                                    -->
      <!-- ============================================================ -->
      <kColl id="services">
        <field id="HTTPService"
               value="com.ibm.il.dse.cc.service.communication.http.HTTPService"/>
        <field id="MainframeConnector"
               value="com.ibm.il.dse.cc.service.communication.mf.MainframeConnector"/>
      </kColl>

      <kColl id="contexts">
        <!-- Contexts are resolved from XML definitions, not dse.ini -->
      </kColl>

      <kColl id="data">
      </kColl>

      <kColl id="processors">
      </kColl>

      <kColl id="types">
      </kColl>

    </kColl>

  </kColl>

</dse.ini>
