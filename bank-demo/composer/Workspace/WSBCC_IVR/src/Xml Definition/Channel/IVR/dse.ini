<?xml version="1.0" encoding="ISO-8859-1"?>
<dse.ini>

  <!-- IVR (phone banking) channel.
       Inherits from XML base. Some operations overlap with INTERNET
       but with different opStep sets (onlyFor filtering). -->

  <kColl id="import">
    <field id="XML"/>
  </kColl>

  <kColl id="settings">

    <kColl id="files">

      <kColl id="defaultFile">
        <operDef id="Xml Definition/Channel/IVR/defaultFile/dsecontext.xml"/>
        <operDef id="Xml Definition/Channel/IVR/defaultFile/dseformat.xml"/>
        <operDef id="Xml Definition/Channel/IVR/defaultFile/dseConnector.tmp"/>
      </kColl>

      <kColl id="selfDefOper">

        <operDef id="Xml Definition/Channel/IVR/selfDefOper/GetClientAccounts.xml"
                 value="GetClientAccountsOp"/>

        <operDef id="Xml Definition/Channel/IVR/selfDefOper/GetAccountBalance.xml"
                 value="GetAccountBalanceOp"/>

      </kColl>

      <kColl id="operations">
      </kColl>

    </kColl>

    <kColl id="tags">

      <kColl id="opSteps">
        <field id="GetClientAccountsIvrSP"
               value="com.ibm.il.dse.operations.ivr.db.GetClientAccountsIvrSP"/>
        <field id="GetAccountBalanceSP"
               value="com.ibm.il.dse.operations.ivr.db.GetAccountBalanceSP"/>
        <field id="LogIvrSession"
               value="com.ibm.il.dse.operations.ivr.db.LogIvrSession"/>
      </kColl>

      <kColl id="formats">
      </kColl>

      <kColl id="contexts">
      </kColl>

    </kColl>

  </kColl>

</dse.ini>
